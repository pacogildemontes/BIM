{% extends "base.html" %}
{% block title %}Acceso — Mis Finanzas{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card mt-5"><div class="card-body p-4">
            <h4 class="mb-3">🔒 Acceso privado</h4>
            <p class="text-muted small">Introduce la contraseña para ver tus finanzas.</p>
            <form method="post">
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Contraseña" autofocus required>
                </div>
                <button class="btn btn-primary w-100">Entrar</button>
            </form>
        </div></div>
    </div>
</div>
{% endblock %}
