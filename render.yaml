# Blueprint de Render (https://render.com) para desplegar gratis el hub de finanzas.
# Pasos: en Render → New → Blueprint → conecta este repositorio. Render leerá este
# archivo y creará el servicio web. Define DATABASE_URL y APP_PASSWORD cuando lo pida.
#
# Persistencia: el plan gratuito de Render NO tiene disco persistente, por eso usamos
# una base de datos PostgreSQL externa y persistente (Supabase, plan gratuito) a través
# de DATABASE_URL. Si NO defines DATABASE_URL, la app cae a SQLite en /tmp (efímero,
# solo para probar). Ver docs/finanzas.md.
services:
  - type: web
    name: mis-finanzas
    runtime: python
    plan: free
    branch: claude/personal-finance-tracker-wrbtdz
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: DATABASE_URL
        sync: false               # cadena de conexión de Supabase (Postgres). Datos persistentes.
      - key: SECRET_KEY
        generateValue: true       # Render genera una clave de sesión segura
      - key: APP_PASSWORD
        sync: false               # la defines tú en el panel (login de la app)
